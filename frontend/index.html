<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="EvolveTech - Soluções digitais inovadoras para transformar seu negócio. Desenvolvimento web, mobile, APIs e sistemas personalizados." />
    <meta name="keywords" content="desenvolvimento web, aplicativos mobile, APIs, e-commerce, dashboards, React, Node.js, sistemas personalizados, software house" />
    <meta name="author" content="EvolveTech" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="EvolveTech - Soluções Digitais Inovadoras" />
    <meta property="og:description" content="Transformamos suas ideias em soluções digitais. Desenvolvimento web, mobile e sistemas personalizados com tecnologia de ponta." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://evolvetech.com.br" />
    <meta property="og:image" content="/og-image.jpg" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EvolveTech - Soluções Digitais Inovadoras" />
    <meta name="twitter:description" content="Transformamos suas ideias em soluções digitais. Desenvolvimento web, mobile e sistemas personalizados." />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://evolvetech.com.br" />
    
    <title>EvolveTech - Soluções Digitais Inovadoras</title>
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "EvolveTech",
      "url": "https://evolvetech.com.br",
      "logo": "https://evolvetech.com.br/vite.svg",
      "description": "Software house especializada em desenvolvimento web, mobile, APIs e sistemas personalizados",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "BR"
      },
      "sameAs": [
        "https://github.com/evolvetechsolutionsldn-glitch"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "availableLanguage": ["pt-BR", "en"]
      },
      "offers": {
        "@type": "AggregateOffer",
        "offerCount": "6",
        "offers": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Desenvolvimento Web",
              "description": "Sites e aplicações web modernas, responsivas e otimizadas para performance"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Desenvolvimento Mobile",
              "description": "Aplicativos nativos e híbridos para iOS e Android"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "APIs e Backend",
              "description": "Arquiteturas robustas e escaláveis"
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
